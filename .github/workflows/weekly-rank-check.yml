name: Weekly firm rank check
on: {schedule: [{cron: "0 7 * * 1"}], workflow_dispatch: {}}
jobs: {check-rankings: {runs-on: "ubuntu-latest", permissions: {issues: "write"}, steps: [{name: "Checkout repo", uses: "actions/checkout@v4"}, {name: "Set up Node", uses: "actions/setup-node@v4", with: {node-version: "20"}}, {name: "Run rank check", id: "rankcheck", run: "bash scripts/check-and-report-ranks.sh"}, {name: "Open issue if ranks changed", if: "steps.rankcheck.outputs.has_changes == 'true'", env: {GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"}, run: "node scripts/create-rank-issue.mjs"}]}}
